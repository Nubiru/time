<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="enter-screen">
        <div id="enter-sun"></div>
        <div id="enter-text">Enter Time</div>
    </div>

    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <div id="ui-overlay">
        <div id="time-hud"></div>
        <div id="settings-btn" class="corner-btn corner-btn-settings" title="Settings (,)">&#9881;<span class="keybadge">,</span></div>
        <div id="help-btn" class="corner-btn" title="Keyboard shortcuts (?)">?<span class="keybadge">?</span></div>

        <div id="help-panel" class="panel frosted centered hidden" role="dialog" aria-label="Keyboard shortcuts">
            <div class="panel-header">
                <span class="text-accent">Keyboard Shortcuts</span>
                <span class="panel-close" role="button" aria-label="Close" tabindex="0">&times;</span>
            </div>
            <div class="panel-body" id="help-content"></div>
        </div>

        <div id="cmd-palette" class="panel frosted centered hidden" role="dialog" aria-label="Command palette">
            <div class="panel-header">
                <input type="text" id="cmd-search" class="cmd-input" placeholder="Type a command..." autocomplete="off" spellcheck="false">
            </div>
            <div class="panel-body" id="cmd-results"></div>
        </div>

        <div id="layer-panel" class="panel frosted edge-left hidden" role="complementary" aria-label="Layer toggles">
            <div class="panel-header"><span class="text-accent">Layers</span></div>
            <div class="panel-body" id="layer-content"></div>
        </div>

        <div id="settings-panel" class="panel frosted centered hidden" role="dialog" aria-label="Settings">
            <div class="panel-header">
                <span class="text-accent">Settings</span>
                <span class="panel-close" role="button" aria-label="Close" tabindex="0">&times;</span>
            </div>
            <div class="panel-body" id="settings-content"></div>
        </div>

        <div id="time-bar" class="toolbar edge-bottom">
            <div id="timeline-track" class="timeline-track"></div>
            <div id="time-bar-inner">
                <button id="tb-pause" class="tb-btn" title="Pause/Resume (Space)">&#9654;</button>
                <span id="tb-speed" class="text-secondary">1x</span>
                <span id="tb-date" class="text-primary"></span>
                <button id="tb-now" class="tb-btn text-accent" title="Jump to Now (N)">Now</button>
                <button id="tb-share" class="tb-btn" title="Share this moment">Share</button>
            </div>
        </div>

        <div id="birth-panel" class="panel frosted centered hidden" role="dialog" aria-label="Birth date">
            <div class="panel-header">
                <span class="text-accent">See yourself across every calendar</span>
                <span class="panel-close" role="button" aria-label="Close" tabindex="0">&times;</span>
            </div>
            <div class="panel-body">
                <div class="text-muted" style="font-size:var(--font-size-compact);margin-bottom:var(--sp-3)">Enter your birth date to unlock your identity in 7 time systems <kbd>P</kbd></div>
                <form id="birth-form" autocomplete="off">
                    <label class="text-secondary">Day
                        <input type="number" id="birth-day" min="1" max="31" placeholder="DD" class="cmd-input" style="width:4em;min-height:44px">
                    </label>
                    <label class="text-secondary">Month
                        <input type="number" id="birth-month" min="1" max="12" placeholder="MM" class="cmd-input" style="width:4em;min-height:44px">
                    </label>
                    <label class="text-secondary">Year
                        <input type="number" id="birth-year" min="1" max="2100" placeholder="YYYY" class="cmd-input" style="width:5em;min-height:44px">
                    </label>
                    <button type="submit" class="tb-btn text-accent" style="margin-left:1em;min-height:44px">Reveal</button>
                </form>
                <div id="birth-result" class="text-primary" style="margin-top:0.8em"></div>
                <div style="margin-top:var(--sp-4);padding-top:var(--sp-3);border-top:1px solid var(--glass-border)">
                    <div class="text-muted" style="font-size:var(--font-size-compact);margin-bottom:var(--sp-2)">Location (unlocks ascendant, prayer times, sunrise)</div>
                    <button id="gps-btn" class="tb-btn text-accent" style="min-height:44px">Use GPS</button>
                    <span id="loc-display" class="text-secondary" style="margin-left:var(--sp-3);font-size:var(--font-size-compact)"></span>
                </div>
                <div style="margin-top:var(--sp-4);padding-top:var(--sp-3);border-top:1px solid var(--glass-border)">
                    <div class="text-muted" style="font-size:var(--font-size-compact);margin-bottom:var(--sp-2)">Audio <kbd>M</kbd> <span id="audio-status" class="text-secondary"></span></div>
                    <input type="range" id="vol-slider" class="settings-slider" min="0" max="100" value="12" style="width:120px;vertical-align:middle">
                    <span id="vol-display" class="text-muted" style="font-size:var(--font-size-compact);margin-left:var(--sp-2)">12%</span>
                </div>
            </div>
        </div>

        <div id="focus-badges" class="focus-badges">
            <div class="focus-badge" data-focus="1" title="Astrology">A</div>
            <div class="focus-badge" data-focus="2" title="Kin Maya">K</div>
            <div class="focus-badge" data-focus="3" title="I Ching">I</div>
            <div class="focus-badge" data-focus="4" title="Chinese">C</div>
            <div class="focus-badge" data-focus="5" title="Human Design">D</div>
            <div class="focus-badge" data-focus="6" title="Kabbalah">T</div>
        </div>

        <div id="toast-area"></div>
        <div id="first-hint" class="hint">Press <kbd>?</kbd> for controls</div>
    </div>

    <script>
    (function() {
        'use strict';

        /* Enter Time threshold — first-contact experience */
        var enterScreen = document.getElementById('enter-screen');
        if (enterScreen) {
            if (localStorage.getItem('time_entered')) {
                enterScreen.classList.add('hidden');
            } else {
                enterScreen.addEventListener('click', function() {
                    enterScreen.classList.add('hidden');
                    localStorage.setItem('time_entered', '1');
                    /* Resume AudioContext — this click IS a user gesture */
                    var ta = window._timeAudio;
                    if (ta && ta.ctx && ta.ctx.state === 'suspended') ta.ctx.resume();
                });
            }
        }

        var BOTTOM_ZONE = 60, LEFT_ZONE = 40;

        document.addEventListener('mousemove', function(e) {
            var h = window.innerHeight;
            var timeBar = document.getElementById('time-bar');
            var layerPanel = document.getElementById('layer-panel');
            if (timeBar) {
                if (h - e.clientY < BOTTOM_ZONE) timeBar.classList.add('visible');
                else if (!timeBar.classList.contains('pinned')) timeBar.classList.remove('visible');
            }
            if (layerPanel && !layerPanel.classList.contains('mode-open')) {
                if (e.clientX < LEFT_ZONE) layerPanel.classList.add('proximity');
                else layerPanel.classList.remove('proximity');
            }
        });

        document.addEventListener('keydown', function(e) {
            /* Let HTML inputs handle their own keyboard events */
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') {
                if (e.key === 'Escape') {
                    e.target.blur();
                    if (Module && Module._ui_close_panels) Module._ui_close_panels();
                }
                return;
            }
            switch(e.key) {
                case '?': if (Module && Module._ui_toggle_help) Module._ui_toggle_help(); break;
                case ',': if (Module && Module._ui_toggle_settings) Module._ui_toggle_settings(); break;
                case '/':
                    e.preventDefault();
                    if (Module && Module._ui_toggle_command_palette) {
                        Module._ui_toggle_command_palette();
                        setTimeout(function() {
                            var input = document.getElementById('cmd-search');
                            if (input) { input.value = ''; input.focus(); }
                        }, 50);
                    }
                    break;
                case 'Escape': if (Module && Module._ui_close_panels) Module._ui_close_panels(); break;
            }
        });

        var helpBtn = document.getElementById('help-btn');
        if (helpBtn) helpBtn.addEventListener('click', function() {
            if (Module && Module._ui_toggle_help) Module._ui_toggle_help();
        });
        var settingsBtn = document.getElementById('settings-btn');
        if (settingsBtn) settingsBtn.addEventListener('click', function() {
            if (Module && Module._ui_toggle_settings) Module._ui_toggle_settings();
        });

        /* Focus badges — click to activate focus mode (About Face ACTION 3) */
        document.querySelectorAll('.focus-badge').forEach(function(badge) {
            badge.addEventListener('click', function() {
                var focus = parseInt(badge.dataset.focus, 10);
                if (Module && Module._ui_set_focus) Module._ui_set_focus(focus);
            });
        });

        /* Three-finger tap → help on touch devices (About Face ACTION 12) */
        document.addEventListener('touchstart', function(e) {
            if (e.touches.length === 3) {
                e.preventDefault();
                if (Module && Module._ui_toggle_help) Module._ui_toggle_help();
            }
        }, {passive: false});

        /* Settings panel: event delegation for toggles, choices, sliders */
        var settingsContent = document.getElementById('settings-content');
        if (settingsContent) {
            settingsContent.addEventListener('click', function(e) {
                var toggle = e.target.closest('.settings-toggle');
                if (toggle) {
                    var item = toggle.closest('.settings-item');
                    if (!item) return;
                    var sec = parseInt(item.dataset.sec, 10);
                    var opt = parseInt(item.dataset.opt, 10);
                    var active = toggle.classList.toggle('active');
                    if (Module && Module._ui_settings_toggle)
                        Module._ui_settings_toggle(sec, opt, active ? 1 : 0);
                    return;
                }
                var pill = e.target.closest('.settings-pill');
                if (pill) {
                    var item = pill.closest('.settings-item');
                    if (!item) return;
                    var sec = parseInt(item.dataset.sec, 10);
                    var opt = parseInt(item.dataset.opt, 10);
                    var idx = parseInt(pill.dataset.idx, 10);
                    pill.parentElement.querySelectorAll('.settings-pill').forEach(function(p) {
                        p.classList.remove('active');
                    });
                    pill.classList.add('active');
                    if (Module && Module._ui_settings_choice)
                        Module._ui_settings_choice(sec, opt, idx);
                    return;
                }
            });
            settingsContent.addEventListener('input', function(e) {
                if (e.target.classList.contains('settings-slider')) {
                    var item = e.target.closest('.settings-item');
                    if (!item) return;
                    var sec = parseInt(item.dataset.sec, 10);
                    var opt = parseInt(item.dataset.opt, 10);
                    var valSpan = item.querySelector('.settings-slider-val');
                    if (valSpan) valSpan.textContent = parseFloat(e.target.value).toFixed(1);
                    if (Module && Module._ui_settings_slider)
                        Module._ui_settings_slider(sec, opt, e.target.valueAsNumber);
                }
            });
        }
        document.querySelectorAll('.panel-close').forEach(function(btn) {
            btn.addEventListener('click', function() {
                /* Hide all JS-managed panels */
                var bp = document.getElementById('birth-panel');
                if (bp) bp.classList.add('hidden');
                if (Module && Module._ui_close_panels) Module._ui_close_panels();
            });
        });
        var tbPause = document.getElementById('tb-pause');
        if (tbPause) tbPause.addEventListener('click', function() {
            if (Module && Module._ui_toggle_pause) Module._ui_toggle_pause();
        });
        var tbNow = document.getElementById('tb-now');
        if (tbNow) tbNow.addEventListener('click', function() {
            if (Module && Module._ui_jump_to_now) Module._ui_jump_to_now();
        });
        var tbShare = document.getElementById('tb-share');
        if (tbShare) tbShare.addEventListener('click', function() {
            if (!Module || !Module._ui_get_share_text) return;
            var textPtr = Module._ui_get_share_text();
            var text = textPtr ? UTF8ToString(textPtr) : 'Time — A Visual Study';
            var urlPtr = Module._ui_get_share_url();
            var url = urlPtr ? ('https://nubiru.github.io/time/' + UTF8ToString(urlPtr)) : 'https://nubiru.github.io/time/';
            if (navigator.share) {
                navigator.share({ title: 'Time', text: text, url: url }).catch(function() {});
            } else {
                navigator.clipboard.writeText(text + '\n' + url).then(function() {
                    var t = document.getElementById('toast-area');
                    if (t) {
                        t.textContent = 'Copied to clipboard';
                        t.classList.add('visible');
                        setTimeout(function() { t.classList.remove('visible'); }, 1500);
                    }
                });
            }
        });

        /* Timeline scrubber — drag to navigate time */
        var tlTrack = document.getElementById('timeline-track');
        if (tlTrack) {
            var tlSpanDays = 30; /* visible range: 30 days default */
            var tlDragging = false;
            var tlStartX = 0;
            var tlStartJD = 0;

            tlTrack.addEventListener('mousedown', function(e) {
                if (!Module || !Module._ui_get_jd) return;
                tlDragging = true;
                tlStartX = e.clientX;
                tlStartJD = Module._ui_get_jd();
                e.preventDefault();
            });
            document.addEventListener('mousemove', function(e) {
                if (!tlDragging || !Module || !Module._ui_set_jd) return;
                var dx = e.clientX - tlStartX;
                var frac = dx / window.innerWidth;
                Module._ui_set_jd(tlStartJD - frac * tlSpanDays);
            });
            document.addEventListener('mouseup', function() {
                tlDragging = false;
            });

            /* Zoom timeline with Shift+scroll */
            tlTrack.addEventListener('wheel', function(e) {
                e.preventDefault();
                if (e.deltaY > 0) tlSpanDays *= 1.5;
                else tlSpanDays /= 1.5;
                if (tlSpanDays < 1) tlSpanDays = 1;
                if (tlSpanDays > 365000) tlSpanDays = 365000;
            }, {passive: false});

            /* Render timeline ticks (simple date labels) */
            setInterval(function() {
                if (!Module || !Module._ui_get_jd) return;
                var jd = Module._ui_get_jd();
                var html = '<div class="tl-cursor"></div>';
                var ticks = 7;
                for (var i = -ticks; i <= ticks; i++) {
                    var tickJD = jd + i * (tlSpanDays / (ticks * 2));
                    var pos = 50 + (i / ticks) * 45;
                    var d = new Date((tickJD - 2440587.5) * 86400000);
                    var label = (tlSpanDays < 3)
                        ? d.getUTCHours() + ':' + String(d.getUTCMinutes()).padStart(2,'0')
                        : (tlSpanDays < 90)
                            ? (d.getUTCMonth()+1) + '/' + d.getUTCDate()
                            : d.getUTCFullYear();
                    var cls = (i === 0) ? 'tl-tick anchor' : (i % 2 === 0) ? 'tl-tick major' : 'tl-tick';
                    html += '<span class="' + cls + '" style="left:' + pos + '%">' + label + '</span>';
                }
                tlTrack.innerHTML = html;
            }, 500);
        }

        /* Birth date panel — P key (gated on interaction, About Face ACTION 4) */
        var birthPanel = document.getElementById('birth-panel');
        var birthForm = document.getElementById('birth-form');
        var hasInteracted = false;
        document.addEventListener('wheel', function() { hasInteracted = true; }, {once: true});
        document.addEventListener('mousedown', function() { hasInteracted = true; }, {once: true});
        document.addEventListener('touchstart', function() { hasInteracted = true; }, {once: true});
        function toggleBirth() {
            if (birthPanel) birthPanel.classList.toggle('hidden');
        }
        document.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'INPUT') return;
            if (e.key === 'p' || e.key === 'P') {
                if (!hasInteracted && !localStorage.getItem('time_birth')) return;
                toggleBirth();
            }
        });
        if (birthForm) {
            birthForm.addEventListener('submit', function(e) {
                e.preventDefault();
                var y = parseInt(document.getElementById('birth-year').value, 10);
                var m = parseInt(document.getElementById('birth-month').value, 10);
                var d = parseInt(document.getElementById('birth-day').value, 10);
                if (!y || !m || !d) return;
                if (Module && Module._ui_set_birth_date) {
                    Module._ui_set_birth_date(y, m, d);
                    localStorage.setItem('time_birth', JSON.stringify({y:y, m:m, d:d}));
                    if (Module._ui_show_birth_profile)
                        Module._ui_show_birth_profile();
                }
            });
            /* Restore from localStorage on load */
            var saved = localStorage.getItem('time_birth');
            if (saved) {
                try {
                    var b = JSON.parse(saved);
                    document.getElementById('birth-year').value = b.y;
                    document.getElementById('birth-month').value = b.m;
                    document.getElementById('birth-day').value = b.d;
                    /* Apply after WASM loads */
                    if (typeof Module !== 'undefined' && Module._ui_set_birth_date) {
                        Module._ui_set_birth_date(b.y, b.m, b.d);
                    } else {
                        window.addEventListener('load', function() {
                            setTimeout(function() {
                                if (Module && Module._ui_set_birth_date)
                                    Module._ui_set_birth_date(b.y, b.m, b.d);
                            }, 500);
                        });
                    }
                } catch(ex) { /* ignore parse errors */ }
            }
        }

        /* GPS location — wire to observer_lat/lon */
        var gpsBtn = document.getElementById('gps-btn');
        var locDisplay = document.getElementById('loc-display');
        if (gpsBtn) {
            /* Restore saved location */
            var savedLoc = localStorage.getItem('time_location');
            if (savedLoc) {
                try {
                    var loc = JSON.parse(savedLoc);
                    if (Module && Module._ui_set_location)
                        Module._ui_set_location(loc.lat, loc.lon);
                    if (locDisplay)
                        locDisplay.textContent = loc.lat.toFixed(2) + ', ' + loc.lon.toFixed(2);
                } catch(ex) {}
            }
            gpsBtn.addEventListener('click', function() {
                if (!navigator.geolocation) {
                    if (locDisplay) locDisplay.textContent = 'GPS not available';
                    return;
                }
                gpsBtn.textContent = 'Locating...';
                navigator.geolocation.getCurrentPosition(function(pos) {
                    var lat = pos.coords.latitude;
                    var lon = pos.coords.longitude;
                    if (Module && Module._ui_set_location)
                        Module._ui_set_location(lat, lon);
                    localStorage.setItem('time_location', JSON.stringify({lat:lat, lon:lon}));
                    if (locDisplay) locDisplay.textContent = lat.toFixed(2) + ', ' + lon.toFixed(2);
                    gpsBtn.textContent = 'Updated';
                    setTimeout(function() { gpsBtn.textContent = 'Use GPS'; }, 2000);
                }, function(err) {
                    if (locDisplay) locDisplay.textContent = 'Permission denied';
                    gpsBtn.textContent = 'Use GPS';
                });
            });
        }

        /* Audio volume slider */
        var volSlider = document.getElementById('vol-slider');
        var volDisplay = document.getElementById('vol-display');
        var audioStatus = document.getElementById('audio-status');
        if (volSlider) {
            var savedVol = localStorage.getItem('time_volume');
            if (savedVol !== null) {
                volSlider.value = savedVol;
                if (volDisplay) volDisplay.textContent = savedVol + '%';
            }
            volSlider.addEventListener('input', function() {
                var v = parseInt(volSlider.value, 10);
                if (volDisplay) volDisplay.textContent = v + '%';
                if (Module && Module._ui_set_volume)
                    Module._ui_set_volume(v / 100.0);
                localStorage.setItem('time_volume', String(v));
            });
            /* Apply saved volume after WASM loads */
            window.addEventListener('load', function() {
                setTimeout(function() {
                    if (Module && Module._ui_set_volume && savedVol)
                        Module._ui_set_volume(parseInt(savedVol, 10) / 100.0);
                }, 600);
            });
        }

        /* Locale toggle — L key cycles locales */
        var LOCALES = [
            {id: 0,  code: 'EN', name: 'English'},
            {id: 1,  code: 'ES', name: 'Espanol'},
            {id: 2,  code: 'AR', name: 'Arabic'},
            {id: 3,  code: 'HE', name: 'Hebrew'},
            {id: 4,  code: 'ZH', name: 'Chinese'},
            {id: 5,  code: 'HI', name: 'Hindi'},
            {id: 6,  code: 'JA', name: 'Japanese'},
            {id: 7,  code: 'FR', name: 'French'},
            {id: 8,  code: 'PT', name: 'Portuguese'},
            {id: 9,  code: 'DE', name: 'German'},
            {id: 10, code: 'RU', name: 'Russian'},
            {id: 11, code: 'KO', name: 'Korean'},
            {id: 12, code: 'TH', name: 'Thai'},
            {id: 13, code: 'TR', name: 'Turkish'},
            {id: 14, code: 'ID', name: 'Indonesian'},
            {id: 15, code: 'MY', name: 'Myanmar'},
            {id: 16, code: 'AM', name: 'Amharic'},
            {id: 17, code: 'BN', name: 'Bengali'},
            {id: 18, code: 'VI', name: 'Vietnamese'},
            {id: 19, code: 'SW', name: 'Swahili'},
            {id: 20, code: 'FA', name: 'Persian'}
        ];
        var localeIdx = 0;
        (function restoreLocale() {
            var saved = localStorage.getItem('time_locale');
            if (saved !== null) {
                var id = parseInt(saved, 10);
                for (var i = 0; i < LOCALES.length; i++) {
                    if (LOCALES[i].id === id) { localeIdx = i; break; }
                }
            }
            window.addEventListener('load', function() {
                setTimeout(function() {
                    if (Module && Module._ui_set_locale)
                        Module._ui_set_locale(LOCALES[localeIdx].id);
                }, 500);
            });
        })();
        document.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'INPUT') return;
            if (e.key === 'l' || e.key === 'L') {
                localeIdx = (localeIdx + 1) % LOCALES.length;
                var loc = LOCALES[localeIdx];
                if (Module && Module._ui_set_locale) Module._ui_set_locale(loc.id);
                localStorage.setItem('time_locale', String(loc.id));
                /* Brief toast */
                var toast = document.getElementById('toast-area');
                if (toast) {
                    toast.textContent = 'Language: ' + loc.name;
                    toast.classList.add('visible');
                    setTimeout(function() { toast.classList.remove('visible'); }, 1500);
                }
            }
        });

        /* Earth View toggle — E key also wired in C input.c, this adds WASM bridge */
        document.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'INPUT') return;
            if (e.key === 'e' || e.key === 'E') {
                if (Module && Module._ui_get_view && Module._ui_set_view) {
                    var cur = Module._ui_get_view();
                    Module._ui_set_view(cur === 0 ? 1 : 0);
                }
            }
        });

        /* Personal View toggle — R key */
        document.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'INPUT') return;
            if (e.key === 'r' || e.key === 'R') {
                if (Module && Module._ui_get_view && Module._ui_set_view) {
                    var cur = Module._ui_get_view();
                    Module._ui_set_view(cur === 3 ? 0 : 3);
                }
            }
        });

        /* Canvas resize — keep WebGL drawing buffer matched to CSS layout */
        var resizeTimeout;
        window.addEventListener('resize', function() {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(function() {
                var w = window.innerWidth;
                var h = window.innerHeight;
                if (Module && Module._ui_on_resize) {
                    Module._ui_on_resize(w, h);
                }
            }, 100);
        });

        /* 3-step progressive coach (About Face ACTION 2) */
        var hint = document.getElementById('first-hint');
        if (hint && !localStorage.getItem('time_coach_done')) {
            var steps = [
                { delay: 3000,  text: 'Scroll to zoom \u2022 Drag to orbit', dur: 6000 },
                { delay: 12000, text: 'Press A for Astrology \u2022 K for Kin Maya \u2022 I for I Ching', dur: 8000 },
                { delay: 25000, text: 'Press P to enter your birth date', dur: 6000 }
            ];
            var shown = 0;
            steps.forEach(function(step) {
                setTimeout(function() {
                    hint.textContent = step.text;
                    hint.classList.add('visible');
                    setTimeout(function() {
                        hint.classList.remove('visible');
                        shown++;
                        if (shown >= steps.length)
                            localStorage.setItem('time_coach_done', '1');
                    }, step.dur);
                }, step.delay);
            });
        }

        /* Click-to-skip enter_zoom (About Face ACTION 10) */
        var canvas = document.getElementById('canvas');
        if (canvas) {
            var skipHandler = function() {
                if (Module && Module._ui_skip_enter_zoom)
                    Module._ui_skip_enter_zoom();
                canvas.removeEventListener('click', skipHandler);
            };
            canvas.addEventListener('click', skipHandler);
        }

        /* Time bar always-visible first session (About Face ACTION 7) */
        if (!localStorage.getItem('time_session_count')) {
            var tb = document.getElementById('time-bar');
            if (tb) tb.classList.add('visible');
            localStorage.setItem('time_session_count', '1');
        } else {
            var count = parseInt(localStorage.getItem('time_session_count'), 10) || 0;
            localStorage.setItem('time_session_count', String(count + 1));
        }
    })();
    </script>

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./service-worker.js');
    }
    </script>
