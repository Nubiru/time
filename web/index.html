<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="enter-screen">
        <div id="enter-sun"></div>
        <div id="enter-text">Enter Time</div>
    </div>

    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <div id="ui-overlay">
        <div id="time-hud"></div>
        <div id="settings-btn" class="corner-btn corner-btn-settings" title="Settings (,)">&#9881;</div>
        <div id="help-btn" class="corner-btn" title="Keyboard shortcuts (?)">?</div>

        <div id="help-panel" class="panel frosted centered hidden" role="dialog" aria-label="Keyboard shortcuts">
            <div class="panel-header">
                <span class="text-accent">Keyboard Shortcuts</span>
                <span class="panel-close" role="button" aria-label="Close" tabindex="0">&times;</span>
            </div>
            <div class="panel-body" id="help-content"></div>
        </div>

        <div id="cmd-palette" class="panel frosted centered hidden" role="dialog" aria-label="Command palette">
            <div class="panel-header">
                <input type="text" id="cmd-search" class="cmd-input" placeholder="Type a command..." autocomplete="off" spellcheck="false">
            </div>
            <div class="panel-body" id="cmd-results"></div>
        </div>

        <div id="layer-panel" class="panel frosted edge-left hidden" role="complementary" aria-label="Layer toggles">
            <div class="panel-header"><span class="text-accent">Layers</span></div>
            <div class="panel-body" id="layer-content"></div>
        </div>

        <div id="settings-panel" class="panel frosted edge-right hidden" role="dialog" aria-label="Settings">
            <div class="panel-header">
                <span class="text-accent">Settings</span>
                <span class="panel-close" role="button" aria-label="Close" tabindex="0">&times;</span>
            </div>
            <div class="panel-body" id="settings-content"></div>
        </div>

        <div id="time-bar" class="toolbar edge-bottom">
            <div id="time-bar-inner">
                <button id="tb-pause" class="tb-btn" title="Pause/Resume (Space)">&#9654;</button>
                <span id="tb-speed" class="text-secondary">1x</span>
                <span id="tb-date" class="text-primary"></span>
                <button id="tb-now" class="tb-btn text-accent" title="Jump to Now (N)">Now</button>
            </div>
        </div>

        <div id="birth-panel" class="panel frosted centered hidden" role="dialog" aria-label="Birth date">
            <div class="panel-header">
                <span class="text-accent">When did you arrive?</span>
                <span class="panel-close" role="button" aria-label="Close" tabindex="0">&times;</span>
            </div>
            <div class="panel-body">
                <form id="birth-form" autocomplete="off">
                    <label class="text-secondary">Day
                        <input type="number" id="birth-day" min="1" max="31" placeholder="DD" class="cmd-input" style="width:4em">
                    </label>
                    <label class="text-secondary">Month
                        <input type="number" id="birth-month" min="1" max="12" placeholder="MM" class="cmd-input" style="width:4em">
                    </label>
                    <label class="text-secondary">Year
                        <input type="number" id="birth-year" min="1" max="2100" placeholder="YYYY" class="cmd-input" style="width:5em">
                    </label>
                    <button type="submit" class="tb-btn text-accent" style="margin-left:1em">Reveal</button>
                </form>
                <div id="birth-result" class="text-primary" style="margin-top:0.8em"></div>
            </div>
        </div>

        <div id="toast-area"></div>
        <div id="first-hint" class="hint">Press <kbd>?</kbd> for controls</div>
    </div>

    <script>
    (function() {
        'use strict';

        /* Enter Time threshold — first-contact experience */
        var enterScreen = document.getElementById('enter-screen');
        if (enterScreen) {
            if (localStorage.getItem('time_entered')) {
                enterScreen.classList.add('hidden');
            } else {
                enterScreen.addEventListener('click', function() {
                    enterScreen.classList.add('hidden');
                    localStorage.setItem('time_entered', '1');
                    /* Resume AudioContext — this click IS a user gesture */
                    var ta = window._timeAudio;
                    if (ta && ta.ctx && ta.ctx.state === 'suspended') ta.ctx.resume();
                });
            }
        }

        var BOTTOM_ZONE = 60, LEFT_ZONE = 40;

        document.addEventListener('mousemove', function(e) {
            var h = window.innerHeight;
            var timeBar = document.getElementById('time-bar');
            var layerPanel = document.getElementById('layer-panel');
            if (timeBar) {
                if (h - e.clientY < BOTTOM_ZONE) timeBar.classList.add('visible');
                else if (!timeBar.classList.contains('pinned')) timeBar.classList.remove('visible');
            }
            if (layerPanel && !layerPanel.classList.contains('mode-open')) {
                if (e.clientX < LEFT_ZONE) layerPanel.classList.add('proximity');
                else layerPanel.classList.remove('proximity');
            }
        });

        document.addEventListener('keydown', function(e) {
            /* Let HTML inputs handle their own keyboard events */
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') {
                if (e.key === 'Escape') {
                    e.target.blur();
                    if (Module && Module._ui_close_panels) Module._ui_close_panels();
                }
                return;
            }
            switch(e.key) {
                case '?': if (Module && Module._ui_toggle_help) Module._ui_toggle_help(); break;
                case ',': if (Module && Module._ui_toggle_settings) Module._ui_toggle_settings(); break;
                case '/':
                    e.preventDefault();
                    if (Module && Module._ui_toggle_command_palette) {
                        Module._ui_toggle_command_palette();
                        setTimeout(function() {
                            var input = document.getElementById('cmd-search');
                            if (input) { input.value = ''; input.focus(); }
                        }, 50);
                    }
                    break;
                case 'Escape': if (Module && Module._ui_close_panels) Module._ui_close_panels(); break;
            }
        });

        var helpBtn = document.getElementById('help-btn');
        if (helpBtn) helpBtn.addEventListener('click', function() {
            if (Module && Module._ui_toggle_help) Module._ui_toggle_help();
        });
        var settingsBtn = document.getElementById('settings-btn');
        if (settingsBtn) settingsBtn.addEventListener('click', function() {
            if (Module && Module._ui_toggle_settings) Module._ui_toggle_settings();
        });

        /* Settings panel: event delegation for toggles, choices, sliders */
        var settingsContent = document.getElementById('settings-content');
        if (settingsContent) {
            settingsContent.addEventListener('click', function(e) {
                var toggle = e.target.closest('.settings-toggle');
                if (toggle) {
                    var item = toggle.closest('.settings-item');
                    if (!item) return;
                    var sec = parseInt(item.dataset.sec, 10);
                    var opt = parseInt(item.dataset.opt, 10);
                    var active = toggle.classList.toggle('active');
                    if (Module && Module._ui_settings_toggle)
                        Module._ui_settings_toggle(sec, opt, active ? 1 : 0);
                    return;
                }
                var pill = e.target.closest('.settings-pill');
                if (pill) {
                    var item = pill.closest('.settings-item');
                    if (!item) return;
                    var sec = parseInt(item.dataset.sec, 10);
                    var opt = parseInt(item.dataset.opt, 10);
                    var idx = parseInt(pill.dataset.idx, 10);
                    pill.parentElement.querySelectorAll('.settings-pill').forEach(function(p) {
                        p.classList.remove('active');
                    });
                    pill.classList.add('active');
                    if (Module && Module._ui_settings_choice)
                        Module._ui_settings_choice(sec, opt, idx);
                    return;
                }
            });
            settingsContent.addEventListener('input', function(e) {
                if (e.target.classList.contains('settings-slider')) {
                    var item = e.target.closest('.settings-item');
                    if (!item) return;
                    var sec = parseInt(item.dataset.sec, 10);
                    var opt = parseInt(item.dataset.opt, 10);
                    var valSpan = item.querySelector('.settings-slider-val');
                    if (valSpan) valSpan.textContent = parseFloat(e.target.value).toFixed(1);
                    if (Module && Module._ui_settings_slider)
                        Module._ui_settings_slider(sec, opt, e.target.valueAsNumber);
                }
            });
        }
        document.querySelectorAll('.panel-close').forEach(function(btn) {
            btn.addEventListener('click', function() {
                /* Hide all JS-managed panels */
                var bp = document.getElementById('birth-panel');
                if (bp) bp.classList.add('hidden');
                if (Module && Module._ui_close_panels) Module._ui_close_panels();
            });
        });
        var tbPause = document.getElementById('tb-pause');
        if (tbPause) tbPause.addEventListener('click', function() {
            if (Module && Module._ui_toggle_pause) Module._ui_toggle_pause();
        });
        var tbNow = document.getElementById('tb-now');
        if (tbNow) tbNow.addEventListener('click', function() {
            if (Module && Module._ui_jump_to_now) Module._ui_jump_to_now();
        });

        /* Birth date panel — P key */
        var birthPanel = document.getElementById('birth-panel');
        var birthForm = document.getElementById('birth-form');
        function toggleBirth() {
            if (birthPanel) birthPanel.classList.toggle('hidden');
        }
        document.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'INPUT') return;
            if (e.key === 'p' || e.key === 'P') toggleBirth();
        });
        if (birthForm) {
            birthForm.addEventListener('submit', function(e) {
                e.preventDefault();
                var y = parseInt(document.getElementById('birth-year').value, 10);
                var m = parseInt(document.getElementById('birth-month').value, 10);
                var d = parseInt(document.getElementById('birth-day').value, 10);
                if (!y || !m || !d) return;
                if (Module && Module._ui_set_birth_date) {
                    Module._ui_set_birth_date(y, m, d);
                    localStorage.setItem('time_birth', JSON.stringify({y:y, m:m, d:d}));
                    var kin = Module._ui_get_birth_kin ? Module._ui_get_birth_kin() : 0;
                    var res = document.getElementById('birth-result');
                    if (res) res.textContent = kin > 0
                        ? 'Your Galactic Signature: Kin ' + kin
                        : 'Birth profile computed.';
                }
            });
            /* Restore from localStorage on load */
            var saved = localStorage.getItem('time_birth');
            if (saved) {
                try {
                    var b = JSON.parse(saved);
                    document.getElementById('birth-year').value = b.y;
                    document.getElementById('birth-month').value = b.m;
                    document.getElementById('birth-day').value = b.d;
                    /* Apply after WASM loads */
                    if (typeof Module !== 'undefined' && Module._ui_set_birth_date) {
                        Module._ui_set_birth_date(b.y, b.m, b.d);
                    } else {
                        window.addEventListener('load', function() {
                            setTimeout(function() {
                                if (Module && Module._ui_set_birth_date)
                                    Module._ui_set_birth_date(b.y, b.m, b.d);
                            }, 500);
                        });
                    }
                } catch(ex) { /* ignore parse errors */ }
            }
        }

        /* Locale toggle — L key cycles EN→ES→AR→ZH */
        var LOCALES = [
            {id: 0, code: 'EN', name: 'English'},
            {id: 1, code: 'ES', name: 'Espanol'},
            {id: 2, code: 'AR', name: 'Arabic'},
            {id: 4, code: 'ZH', name: 'Chinese'}
        ];
        var localeIdx = 0;
        (function restoreLocale() {
            var saved = localStorage.getItem('time_locale');
            if (saved !== null) {
                var id = parseInt(saved, 10);
                for (var i = 0; i < LOCALES.length; i++) {
                    if (LOCALES[i].id === id) { localeIdx = i; break; }
                }
            }
            window.addEventListener('load', function() {
                setTimeout(function() {
                    if (Module && Module._ui_set_locale)
                        Module._ui_set_locale(LOCALES[localeIdx].id);
                }, 500);
            });
        })();
        document.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'INPUT') return;
            if (e.key === 'l' || e.key === 'L') {
                localeIdx = (localeIdx + 1) % LOCALES.length;
                var loc = LOCALES[localeIdx];
                if (Module && Module._ui_set_locale) Module._ui_set_locale(loc.id);
                localStorage.setItem('time_locale', String(loc.id));
                /* Brief toast */
                var toast = document.getElementById('toast-area');
                if (toast) {
                    toast.textContent = 'Language: ' + loc.name;
                    toast.classList.add('visible');
                    setTimeout(function() { toast.classList.remove('visible'); }, 1500);
                }
            }
        });

        /* Earth View toggle — E key also wired in C input.c, this adds WASM bridge */
        document.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'INPUT') return;
            if (e.key === 'e' || e.key === 'E') {
                if (Module && Module._ui_get_view && Module._ui_set_view) {
                    var cur = Module._ui_get_view();
                    Module._ui_set_view(cur === 0 ? 1 : 0);
                }
            }
        });

        var hint = document.getElementById('first-hint');
        if (hint && !localStorage.getItem('time_hint_shown')) {
            hint.classList.add('visible');
            setTimeout(function() {
                hint.classList.remove('visible');
                localStorage.setItem('time_hint_shown', '1');
            }, 5000);
        }
    })();
    </script>

    {{{ SCRIPT }}}

    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./service-worker.js');
    }
    </script>
</body>
</html>
